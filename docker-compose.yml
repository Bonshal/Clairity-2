services:
  node-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    restart: always
    depends_on:
      - python-analysis
    networks:
      - app-network

  python-analysis:
    build:
      context: ./analysis
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://node-api:3001/api
    restart: always
    depends_on:
      - node-api
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node-api
      - python-analysis
      - frontend
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
