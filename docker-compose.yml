# docker-compose.yml — EC2 Production Configuration
# The Next.js frontend is hosted on Vercel and is NOT included here.
# Run with: docker compose up -d --build

services:
  python-analysis:
    build:
      context: ./analysis
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    env_file: .env
    restart: always
    deploy:
      resources:
        limits:
          memory: 3G      # torch + transformers need ~2.5G
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # give it time to load ML models on first boot

  node-api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: production
    ports:
      - "3001:3001"
    env_file: .env
    restart: always
    depends_on:
      python-analysis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node-api
      - python-analysis
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
