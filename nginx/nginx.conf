events {
    worker_connections 1024;
}

http {
    upstream node_api {
        server node-api:3001;
    }

    upstream python_analysis {
        server python-analysis:8000;
    }

    # NOTE: The Next.js frontend is hosted on Vercel, not on this EC2 instance.
    # Update NEXT_PUBLIC_API_URL in Vercel project settings to point to this server.

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # Gzip compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;
        gzip_min_length 256;

        # Node.js API Gateway
        location /api/ {
            proxy_pass http://node_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket endpoint (Socket.io)
        location /socket.io/ {
            proxy_pass http://node_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # Python Analysis Service
        location /analysis/ {
            proxy_pass http://python_analysis/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        # Health check
        location /health {
            return 200 '{"status": "ok"}';
            add_header Content-Type application/json;
        }

        # Frontend is on Vercel — direct browser traffic there.
        location / {
            return 404 'The Clairity 2 frontend is hosted at Vercel. Only /api and /analysis routes are served from this server.';
            add_header Content-Type text/plain;
        }
    }

    server {
    listen 443 ssl;
    server_name api.clairityai.me;

    ssl_certificate /etc/letsencrypt/live/api.clairityai.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.clairityai.me/privkey.pem;

    location / {
        proxy_pass http://node-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    }

    server {
    listen 80;
    server_name api.clairityai.me;

    return 301 https://$host$request_uri;
    }
}

